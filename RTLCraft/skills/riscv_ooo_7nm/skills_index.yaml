skill_name: "riscv_ooo_7nm"
description: "8-wide out-of-order RISC-V core on 7nm at 2GHz"
version: "0.1.0"
isa: "riscv64"
tech_node: "7nm"
target_freq_mhz: 2000

architecture:
  fetch_width: 8
  decode_width: 6
  rename_width: 6
  dispatch_width: 6
  commit_width: 6
  rob_size: 256
  nr_phy_regs: 192
  issue_queue_size: 16
  alu_pipes: 4
  load_pipes: 2
  store_pipes: 2
  fpu_pipes: 4
  lq_size: 80
  sq_size: 64
  ibuf_size: 48

modules:
  - name: fetch_stage
    file: cycle_level.py
    function: fetch_stage_cycle
    layer: 2
    maturity: 0.8
    behavior_tags: ["fetch", "pcgen", "icache"]
    interface_patterns: ["valid_ready", "redirect"]
    control_patterns: ["fsm", "stall"]
    datapath_patterns: ["adder"]

  - name: decode_stage
    file: cycle_level.py
    function: decode_stage_cycle
    layer: 2
    maturity: 0.8
    behavior_tags: ["decode", "rename"]
    interface_patterns: ["valid_ready"]
    control_patterns: ["decoder", "fsm"]

  - name: issue_queue
    file: cycle_level.py
    function: issue_queue_cycle
    layer: 2
    maturity: 0.7
    behavior_tags: ["issue", "wakeup", "select"]
    interface_patterns: ["valid_ready", "arbiter"]
    control_patterns: ["arbiter", "priority"]

  - name: alu_exec
    file: cycle_level.py
    function: alu_exec_cycle
    layer: 2
    maturity: 0.9
    behavior_tags: ["execute", "alu"]
    interface_patterns: ["valid_ready"]
    control_patterns: ["decoder"]
    datapath_patterns: ["adder", "shifter", "logic"]

  - name: lsu
    file: cycle_level.py
    function: lsu_cycle
    layer: 2
    maturity: 0.7
    behavior_tags: ["memory", "load", "store"]
    interface_patterns: ["valid_ready", "request_ack"]
    control_patterns: ["fsm"]
    datapath_patterns: ["adder"]

  - name: rob
    file: cycle_level.py
    function: rob_cycle
    layer: 2
    maturity: 0.8
    behavior_tags: ["commit", "retire", "reorder"]
    interface_patterns: ["valid_ready"]
    control_patterns: ["fsm", "circular_buffer"]
    datapath_patterns: ["comparator", "multiplexer"]

  - name: ooo_core
    file: functional.py
    function: ooo_core_functional
    layer: 1
    maturity: 0.9
    behavior_tags: ["core", "riscv", "pipeline"]
    interface_patterns: ["valid_ready"]
    control_patterns: ["decoder"]
    datapath_patterns: ["adder", "shifter", "logic", "comparator"]

patterns:
  - name: out_of_order_issue
    type: microarchitecture
    description: "Wakeup-select issue queue for out-of-order execution"
    modules: ["issue_queue"]
    tags: ["ooo", "issue", "wakeup"]

  - name: circular_rob
    type: microarchitecture
    description: "256-entry circular reorder buffer"
    modules: ["rob"]
    tags: ["rob", "commit", "retire"]

  - name: fetch_redirect
    type: microarchitecture
    description: "Branch redirect with pipeline flush"
    modules: ["fetch_stage"]
    tags: ["fetch", "branch", "redirect"]

  - name: load_store_pipeline
    type: microarchitecture
    description: "2-stage load/store with address generation"
    modules: ["lsu"]
    tags: ["load", "store", "memory"]
