# Skill Index for GPGPU domain
# Extracted from skills/gpgpu/dsl_modules.py (Ventus GPGPU reference)
# This is NOT code to instantiate; it is a retrievable design-experience index.

skills:
  - id: module:gpgpu:WarpScheduler
    source:
      file: skills/gpgpu/dsl_modules.py
      class: WarpScheduler
    kind: module
    domain: gpgpu
    behavior_tags:
      - warp_scheduling
      - arbitration
      - fairness
      - valid_ready
    interface_patterns:
      - multi_request_valid
      - single_grant
      - valid_ready
      - tag_payload
    control_patterns:
      - round_robin
      - priority_scan
      - stall_control
    datapath_patterns:
      - mux_select
      - index_encode
      - pointer_update
    useful_for:
      - warp_issue
      - request_selection
      - arbitration
      - scheduler_generation
    state_patterns:
      - rr_ptr
      - candidate_mask
    summary: >
      Selects one ready warp from multiple active warps using a scheduling policy.
      Inputs: warp_valid, dependency_clear, issue_ready. Outputs: issue_valid, issue_warp_id.
      Maintains round-robin pointer and scans candidates each cycle.
    maturity:
      syntax_checked: true
      sim_tested: false
      synthesizable_likely: true

