clocks:
  - name: "sys_clk"
    period_ns: 6.667
    pin_or_port: "pad_sys_clk"
    setup_uncertainty_ns: 0.1
    hold_uncertainty_ns: 0.05
    transition_ns: 0.08
    clock_type: "CTS"

timing_derate:
  late_factor: 1.05
  early_factor: 0.95

synthesis:
  compile_ultra: true
  no_autoungroup: true
  timing_high_effort: true
  incremental_compile: false
  num_cores: 16
  power_optimization: true
  power_effort: "high"
  leakage_optimization: true
  dynamic_optimization: true
  clock_gating: true
  clock_gating_style: "integrated"
  clock_gating_positive_edge: true
  clock_gating_control_point: "before"
  physically_aware_cg: true
  flatten_cg: true
  max_transition_dc: 0.15
  max_fanout_dc: 30
  max_capacitance_dc: 0.5
  enable_register_merging: false
  svf_enabled: true

cts:
  target_skew_ns: 0.15

placement:
  target_utilization: 0.7
  congestion_effort: "high"
  insert_endcap: true
  insert_welltap: true
  tap_distance_um: 40.0

routing:
  timing_driven: true
  si_driven: true
  antenna_fixing: true
  redundant_via: true

pt:
  num_cores: 16
  enable_cppr: true
  enable_si_analysis: true
  enable_power_analysis: true

eda:
  synopsys_script: "/share/apps/EDAs/syn22.bash"
  primetime_script: "/share/apps/EDAs/syn22.bash"
  mentor_script: "/share/apps/EDAs/mg.bash"
  cadence_script: "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/cadence_env.bash"

innovus:
  num_cores: 8

flow:
  work_root: "./work_150mhz"
  dry_run: false
