# =============================================================================
# FullSystem Design Configuration — TSMC 28nm HPC+, 150MHz
# =============================================================================
# Backward-compatible flat schema (legacy).  The framework loader converts this
# automatically to the nested schema used by the adapters.
# =============================================================================

design_name: "FullSystem"
top_module: "FullSystem_wrapper"
scenario: "func.tt0p9v.wc.cmax_25c.setup"

# ---- Die size ----
die:
  width_um: 3200.0
  height_um: 2200.0
  core_offset_um: [200, 200, 200, 200]
  target_utilization: 0.7

target_utilization: 0.7

# ---- RTL sources ----
rtl:
  dir: "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/rtl"

# ---- SDC constraints ----
# Generated inline by the DC adapter; written out after synthesis for ICC2.
sdc_file: ""

# ---- Libraries ----
libraries:
  std_cell:
    - "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/syn_libs/tcbn28hpcplusbwp30p140uhvttt0p9v25c.db"
    - "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/syn_libs/tcbn28hpcplusbwp30p140ffg0p88v0c.db"
  io:
    - "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/syn_libs/tphn28hpcpgv18tt0p9v1p8v25c.db"
  macro:
    # Only PLL is needed for DC link; SRAMs are instantiated structurally.
    - "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/syn_libs/PLLTS28HPMFRAC_BC.db"
  ndm_libs:
    - "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/ndm/STDCELL.ndm"
    - "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/ndm/PORT.ndm"
    - "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/ndm/PORT_merge_db_physical_only.ndm"
    - "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/ndm/PLL.ndm"
    - "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/ndm/RAMNEW.ndm"
  main_lib_name: "tcbn28hpcplusbwp30p140"
  driver_cell: "INVD1BWP30P140UHVT"
  tap_cell: "TAPCELLBWP30P140"
  endcap_cell: "ENDCAPBWP30P140"
  decap_cells:
    - "DCAP4BWP30P140"
    - "DCAP8BWP30P140"
    - "DCAP16BWP30P140"
  filler_cells:
    - "FILL1BWP30P140"
    - "FILL2BWP30P140"
    - "FILL4BWP30P140"
    - "FILL8BWP30P140"

# ---- PDK ----
pdk:
  name: "tsmc28hpcp"
  tech_file: "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/tf/tsmcn28_10lm7X2ZUTRDL_HVH.tf"
  metal_stack: ["M1", "M2", "M3", "M4", "M5", "M6", "M7", "M8", "M9", "AP"]
  min_routing_layer: "M2"
  max_routing_layer: "M9"
  calibre_drc_runset: "/share/home/yangfan/bp_to/CLN28HP_10M_7X2Z_002.23a.encrypt"
  calibre_lvs_runset: "/share/home/yangfan/bp_to/CLN28HP_10M_7X2Z_002.23a.encrypt"
  tlu_plus_max: "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/tf/cmax.cln28hpm_1p10m+ut-alrdl_7x2z_rcworst.tluplus"
  tlu_plus_min: "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/tf/cmin.cln28hpm_1p10m+ut-alrdl_7x2z_cworst.tluplus"
  tech2itf_map: "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/tf/tech2itf.map"
  setup_voltage_v: 0.9
  hold_voltage_v: 0.88
  temperature_c: 85.0
  gds_map_file: "/share/home/yangfan/backend_scripts/ImplCraft/bp_run/gdsout.map"
  # Innovus requires LEF + Liberty (not Synopsys .db / ICC2 NDM).
  lef_files:
    - "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/lef/tsmcn28_10lm5X2Y2ZUTRDL.tlef"
    - "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/lef/tcbn28hpcplusbwp30p140hvt.lef"
    - "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/lef/tcbn28hpcplusbwp30p140.lef"
    - "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/lef/tcbn28hpcplusbwp30p140lvt.lef"
    - "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/lef/tcbn28hpcplusbwp30p140ulvt.lef"

# ---- EDA tool environment paths ----
eda:
  synopsys: "/share/apps/EDAs/syn22.bash"
  primetime: "/share/apps/EDAs/syn22.bash"
  mentor: "/share/apps/EDAs/mg.bash"
  cadence: "/share/home/yangfan/backend_scripts/ImplCraft/bp_work/cadence_env.bash"

# ---- Clocks ----
# Target: 150 MHz => period = 6.667 ns
clocks:
  - name: "sys_clk"
    period_ns: 6.667
    pin_or_port: "pad_sys_clk"
    setup_uncertainty_ns: 0.1
    hold_uncertainty_ns: 0.05
    transition_ns: 0.08
    clock_type: "CTS"

# ---- Timing derate (OCV) ----
timing_derate:
  late: 1.05
  early: 0.95

# =============================================================================
# SYNTHESIS OPTIONS
# =============================================================================
synthesis:
  # ---- Basic compile ----
  compile_ultra: true
  no_autoungroup: true
  timing_high_effort: true
  incremental_compile: false
  num_cores: 16

  # ---- Physical awareness (DC-T) ----
  physical:
    enabled: false

  # ---- Multi-Corner Multi-Mode ----
  mcmm:
    enabled: false

  # ---- Power optimization ----
  power:
    enabled: true
    effort: "high"
    leakage: true
    dynamic: true
    prediction: false

  # ---- Clock gating ----
  clock_gating:
    enabled: true
    self_gating: false
    style: "integrated"
    positive_edge: true
    control_point: "before"
    physically_aware: true
    flatten: true

  # ---- Timing constraints ----
  timing:
    critical_range_ns: 0.0
    max_transition: 0.15
    max_fanout: 30
    max_capacitance: 0.5
    register_merging: false

  # ---- Congestion optimization ----
  congestion_optimization: false

  # ---- DFT / Scan ----
  dft:
    scan_insertion: false
    scan_style: "multiplexed"
    scan_coverage: false

  # ---- SVF / ECO support ----
  svf_enabled: true

# =============================================================================
# CLOCK TREE SYNTHESIS
# =============================================================================
cts:
  target_skew_ns: 0.15
  target_early_delay_ns: 0.0

# =============================================================================
# PLACEMENT
# =============================================================================
placement:
  target_utilization: 0.7
  congestion_effort: "high"
  insert_endcap: true
  insert_welltap: true
  tap_distance_um: 40.0

# =============================================================================
# ROUTING
# =============================================================================
routing:
  timing_driven: true
  si_driven: true
  antenna_fixing: true
  redundant_via: true
  effort: "high"

# =============================================================================
# PRIMETIME STA SIGN-OFF
# =============================================================================
pt:
  num_cores: 16
  significant_digits: 3
  enable_cppr: true
  enable_si_analysis: true
  enable_power_analysis: true
  max_paths: 200
  nworst: 1
  save_session: true
  enable_analysis_coverage: true

# =============================================================================
# INNOVUS PHYSICAL IMPLEMENTATION
# =============================================================================
innovus:
  num_cores: 8

# =============================================================================
# FLOW OPTIONS
# =============================================================================
flow:
  work_root: "./work_150mhz"
  dry_run: false
