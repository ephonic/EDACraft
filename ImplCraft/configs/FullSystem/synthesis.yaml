# =============================================================================
# Design Compiler Synthesis Configuration
# DC synthesis specific options for FullSystem @ 150MHz.
# =============================================================================

synthesis:
  # ---- Basic compile ----
  compile_ultra: true
  no_autoungroup: true
  timing_high_effort: true
  incremental_compile: false
  num_cores: 16

  # ---- Physical awareness (DC-T) ----
  physical:
    enabled: false

  # ---- Multi-Corner Multi-Mode ----
  mcmm:
    enabled: false

  # ---- Power optimization ----
  power:
    enabled: true
    effort: "high"
    leakage: true
    dynamic: true
    prediction: false

  # ---- Clock gating ----
  clock_gating:
    enabled: true
    self_gating: false
    style: "integrated"
    positive_edge: true
    control_point: "before"
    physically_aware: true
    flatten: true

  # ---- Timing constraints ----
  timing:
    critical_range_ns: 0.0
    max_transition: 0.15
    max_fanout: 30
    max_capacitance: 0.5
    register_merging: false

  # ---- Congestion optimization ----
  congestion_optimization: false

  # ---- DFT / Scan ----
  dft:
    scan_insertion: false
    scan_style: "multiplexed"
    scan_coverage: false

  # ---- SVF / ECO support ----
  svf_enabled: true
